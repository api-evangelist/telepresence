aid: telepresence
name: Telepresence
description: >-
  Telepresence is a Cloud Native Computing Foundation (CNCF) Sandbox open source tool
  that enables fast local development for Kubernetes and OpenShift microservices. It creates
  a bidirectional network bridge between a developer's local machine and a remote Kubernetes
  cluster, allowing services to run locally while connecting to remote dependencies. Originally
  created by Ambassador Labs, Telepresence lets developers intercept traffic destined for
  specific cluster workloads and route it to their local environment for testing and debugging.
